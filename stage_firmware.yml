# =============================================================================
# stage_firmware.yml
# Purpose : Push the firmware image to each device's flash.
#           Platform detected automatically.
#
# IOS-XE : Pushes directly via SCP using net_put (flash:/<image>)
#           Verifies with 'verify /md5'
#
# CBS     : upgrade_tool.py starts a temporary TFTP server on this machine.
#           Ansible tells the CBS switch to pull the file via TFTP.
#           CBS always writes to the inactive image slot (image1.bin).
#           Uses variables: tftp_server_ip, tftp_server_port, tftp_filename
#
# Run order: 2 of 4
# =============================================================================
---
- name: Stage firmware images
  hosts: upgrade_candidates
  gather_facts: false
  connection: network_cli
  serial: 3

  tasks:

    # =========================================================================
    # PLATFORM DETECTION
    # =========================================================================

    - name: Get show version output
      cisco.ios.ios_command:
        commands:
          - show version
      register: version_output

    - name: Detect platform type
      ansible.builtin.set_fact:
        platform: >-
          {{ 'iosxe' if ('IOS XE' in version_output.stdout[0] or 'IOS-XE' in version_output.stdout[0])
             else 'cbs' if ('CBS' in version_output.stdout[0] or 'Active-image' in version_output.stdout[0])
             else 'unknown' }}

    # Skip if already on target version
    - name: Skip host — already on target version
      ansible.builtin.meta: end_host
      when: not (needs_upgrade | default(true) | bool)

    # =========================================================================
    # IDEMPOTENCY CHECK
    # IOS-XE: check if file exists on flash
    # CBS: check if target is already the active image — if so skip entirely
    # =========================================================================

    - name: Check if image already exists on flash (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - "dir flash:{{ firmware_target_image | default(firmware.target_image) }}"
      register: image_check_iosxe
      ignore_errors: true
      when: platform == 'iosxe'

    - name: Check bootvar for target image (CBS)
      cisco.ios.ios_command:
        commands:
          - show bootvar
      register: image_check_cbs
      ignore_errors: true
      when: platform == 'cbs'

    - name: Set image_exists flag (IOS-XE)
      ansible.builtin.set_fact:
        image_exists: "{{ image_check_iosxe is succeeded and image_check_iosxe is not skipped }}"
      when: platform == 'iosxe'

    # For CBS: skip the transfer only if the device is already RUNNING
    # the target version (caught by pre-checks and needs_upgrade=false).
    # We never skip based on bootvar contents since 'boot system tftp://'
    # needs to run to properly stage the image for the next reload.
    - name: Set image_exists flag (CBS)
      ansible.builtin.set_fact:
        image_exists: false
      when: platform == 'cbs'

    - name: Ensure image_exists is defined
      ansible.builtin.set_fact:
        image_exists: false
      when: image_exists is not defined

    - name: Inform operator — image already present, skipping transfer
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}:
          {{ firmware_target_image | default(firmware.target_image) }}
          already present — skipping transfer.
      when: image_exists

    # =========================================================================
    # FILE TRANSFER — IOS-XE (direct SCP push via net_put)
    # =========================================================================

    - name: Push firmware image to device flash (IOS-XE)
      ansible.netcommon.net_put:
        src:      "{{ firmware_local_bin_path }}"
        dest:     "flash:/{{ firmware_target_image | default(firmware.target_image) }}"
        protocol: scp
      when: platform == 'iosxe' and not image_exists
      vars:
        ansible_command_timeout: 2700

    # =========================================================================
    # FILE TRANSFER — CBS (switch pulls from TFTP server on control node)
    #
    # upgrade_tool.py starts a temporary TFTP server and passes:
    #   tftp_server_ip   — IP of this machine reachable by the switch
    #   tftp_server_port — port (69 normally, 6969 if not running as root)
    #   tftp_filename    — firmware .bin filename
    #
    # The switch overwrites its inactive slot (image1.bin) with the new image.
    # Standard TFTP uses port 69 — if tftp_server_port is 69 we use the
    # standard tftp:// URL, otherwise we cannot specify a port in the IOS
    # copy command so the operator must ensure port 69 is used (run with sudo).
    # =========================================================================

    - name: Show firmware download command (CBS)
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}: running
          boot system tftp://{{ tftp_server_ip }}/{{ tftp_filename }}
      when: platform == 'cbs' and not image_exists

    # CBS 'boot system tftp://' downloads the firmware AND sets it as
    # the active image in one step. No prompt is shown — it just runs.
    # The switch only needs a reload after this to boot the new image.
    # Output includes '%COPY-N-ACTIVE' and 'copy operation was completed
    # successfully' when done.
    - name: Download and activate firmware via TFTP (CBS)
      cisco.ios.ios_command:
        commands:
          - "boot system tftp://{{ tftp_server_ip }}/{{ tftp_filename }}"
        wait_for:
          - result[0] contains "completed successfully"
      when: platform == 'cbs' and not image_exists
      vars:
        ansible_command_timeout: 2700
      register: tftp_result

    - name: Show firmware download result (CBS)
      ansible.builtin.debug:
        msg: "{{ tftp_result.stdout[0] }}"
      when: platform == 'cbs' and not image_exists and tftp_result is defined

    - name: Confirm CBS image transfer complete
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}: firmware transfer complete.
          Run Phase 3 to activate and reboot.
      when: platform == 'cbs' and not image_exists

    # =========================================================================
    # MD5 VERIFICATION — IOS-XE only
    # =========================================================================

    - name: Verify MD5 of image on flash (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - "verify /md5 flash:{{ firmware_target_image | default(firmware.target_image) }}"
      register: md5_iosxe
      when: platform == 'iosxe'
      vars:
        ansible_command_timeout: 600

    - name: Assert MD5 matches (IOS-XE)
      ansible.builtin.assert:
        that:
          - firmware_target_md5 | default(firmware.target_md5) in md5_iosxe.stdout[0]
        fail_msg: >
          MD5 MISMATCH on {{ inventory_hostname }}.
          Expected: {{ firmware_target_md5 | default(firmware.target_md5) }}.
          DO NOT proceed — delete the image and re-run staging.
        success_msg: "MD5 verified on {{ inventory_hostname }}."
      when: platform == 'iosxe'

    # =========================================================================
    # STATUS FILE
    # =========================================================================

    - name: Write status — image staged, reboot required
      ansible.builtin.copy:
        content: |
          host={{ inventory_hostname }}
          ip={{ ansible_host }}
          platform={{ platform }}
          status=STAGED
          target_version={{ firmware_target_version | default(firmware.target_version) }}
        dest: "reports/status/{{ inventory_hostname }}.status"
      delegate_to: localhost
