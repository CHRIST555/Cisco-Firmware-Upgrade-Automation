# =============================================================================
# stage_firmware.yml
# Purpose : Push the firmware image from this machine to each device's flash,
#           then verify integrity. Platform detected automatically.
#
# IOS-XE : Image goes to flash:/image.bin
#           MD5 verified with 'verify /md5 flash:<image>'
# CBS     : Image goes to flash://system/images/image.bin
#           Transfer success is confirmed by task completion — no MD5 check
#
# Run order: 2 of 4
# =============================================================================
---
- name: Stage firmware images
  hosts: upgrade_candidates
  gather_facts: false
  connection: network_cli
  serial: 3

  tasks:

    # =========================================================================
    # PLATFORM DETECTION
    # =========================================================================

    - name: Get show version output
      cisco.ios.ios_command:
        commands:
          - show version
      register: version_output

    - name: Detect platform type
      ansible.builtin.set_fact:
        platform: >-
          {{ 'iosxe' if ('IOS XE' in version_output.stdout[0] or 'IOS-XE' in version_output.stdout[0])
             else 'cbs' if ('CBS' in version_output.stdout[0] or 'Active-image' in version_output.stdout[0])
             else 'unknown' }}

    # Skip this entire phase if pre-checks determined no upgrade is needed.
    # needs_upgrade is set by pre_upgrade_checks.yml — if that phase was not
    # run in the same session, default to true so staging proceeds.
    - name: Skip host — already on target version
      ansible.builtin.meta: end_host
      when: not (needs_upgrade | default(true) | bool)

    # =========================================================================
    # IDEMPOTENCY CHECK — skip transfer if image already present
    # =========================================================================

    # IOS-XE: image lives at flash:/image.bin
    - name: Check if image already exists on flash (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - "dir flash:{{ firmware_target_image | default(firmware.target_image) }}"
      register: image_check_iosxe
      ignore_errors: true
      when: platform == 'iosxe'

    # CBS MD5 verification is skipped — the transfer is accepted as
    # successful once the file copy completes without error.
    - name: Confirm image staged successfully (CBS)
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: image staged to
          flash://system/images/{{ firmware_target_image | default(firmware.target_image) }}.
          Verify with 'show version' if needed.
      when: platform == 'cbs'

    # Write status — image is staged and verified, reboot required
    - name: Write status — image staged, reboot required
      ansible.builtin.copy:
        content: |
          host={{ inventory_hostname }}
          ip={{ ansible_host }}
          platform={{ platform }}
          status=STAGED
          target_version={{ firmware_target_version | default(firmware.target_version) }}
        dest: "reports/status/{{ inventory_hostname }}.status"
      delegate_to: localhost
