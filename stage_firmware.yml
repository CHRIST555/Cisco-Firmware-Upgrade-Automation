# =============================================================================
# stage_firmware.yml
# Purpose : Copy the firmware image directly from this machine to each
#           device's flash memory, then verify integrity with MD5.
#           No external file server required — Ansible pushes the file
#           over the existing SSH connection using net_put.
#
# Outputs : firmware image written to flash: on each device
# Run order: 2 of 4  →  pre_upgrade_checks → [HERE] → execute_upgrade → post_upgrade_verify
#
# Note    : serial: 3 balances transfer speed against control-node bandwidth.
#           If your uplink is limited, reduce to serial: 1.
#           The .bin file path is passed in via firmware.local_bin_path,
#           which upgrade_tool.py sets automatically from the file you selected.
# =============================================================================
---
- name: Stage firmware images
  hosts: upgrade_candidates
  gather_facts: false
  connection: network_cli
  serial: 3    # Push to 3 devices at a time — reduce if bandwidth is limited

  tasks:

    # -------------------------------------------------------------------------
    # 1. Idempotency check — skip the transfer if the image is already on flash
    #    'dir flash:<file>' returns non-zero if the file is absent, so we
    #    ignore_errors and branch on the result below.
    # -------------------------------------------------------------------------
    - name: Check whether target image already exists on flash
      cisco.ios.ios_command:
        commands:
          - "dir flash:{{ firmware.target_image }}"
      register: image_check
      ignore_errors: true    # Expected to 'fail' when file is absent

    - name: Inform operator — transfer will be skipped (image already present)
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ firmware.target_image }} already on flash — skipping transfer."
      when: image_check is succeeded

    # -------------------------------------------------------------------------
    # 2. Direct push from control node → device flash
    #    ansible.netcommon.net_put copies a local file to the remote device
    #    over the existing SSH/SCP connection — no separate file server needed.
    #    ansible_command_timeout is extended to 45 min (2700 s) because an
    #    850 MB file over a management-plane link can take a long time.
    # -------------------------------------------------------------------------
    - name: Push firmware image from this machine to device flash
      ansible.netcommon.net_put:
        src:      "{{ firmware.local_bin_path }}"      # Full path on this machine
        dest:     "flash:/{{ firmware.target_image }}" # Destination on device
        protocol: scp                                  # Uses the existing SSH connection
      when: image_check is failed
      vars:
        ansible_command_timeout: 2700    # 45-minute timeout — adjust for slow links

    # -------------------------------------------------------------------------
    # 3. MD5 verification — confirms the image was not corrupted in transit
    #    The device calculates MD5 locally; this can take several minutes for
    #    large images. Result is compared against firmware.target_md5.
    # -------------------------------------------------------------------------
    - name: Calculate MD5 hash of image on flash
      cisco.ios.ios_command:
        commands:
          - "verify /md5 flash:{{ firmware.target_image }}"
      register: md5_result
      vars:
        ansible_command_timeout: 600    # 10-minute timeout for MD5 on large files

    - name: Assert MD5 hash matches expected value
      ansible.builtin.assert:
        that:
          - firmware.target_md5 in md5_result.stdout[0]
        fail_msg: >
          MD5 MISMATCH on {{ inventory_hostname }} for {{ firmware.target_image }}.
          Expected: {{ firmware.target_md5 }}.
          DO NOT proceed — delete the corrupt image with 'del flash:{{ firmware.target_image }}'
          and re-run the staging phase.
        success_msg: "MD5 verified on {{ inventory_hostname }} — image integrity confirmed."
