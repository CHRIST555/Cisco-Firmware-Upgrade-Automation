# =============================================================================
# stage_firmware.yml
# Purpose : Push the firmware image from this machine to each device's flash,
#           then confirm the image is present. Platform detected automatically.
#
# IOS-XE : Uploads to flash:/<image>, verified with 'verify /md5'
# CBS     : Reads inactive image path from 'show bootvar', uploads there.
#           CBS uses a two-slot system — new image always goes to inactive slot.
#           'boot system inactive-image' (Phase 3) then swaps them on reload.
#
# Run order: 2 of 4
# =============================================================================
---
- name: Stage firmware images
  hosts: upgrade_candidates
  gather_facts: false
  connection: network_cli
  serial: 3

  tasks:

    # =========================================================================
    # PLATFORM DETECTION
    # =========================================================================

    - name: Get show version output
      cisco.ios.ios_command:
        commands:
          - show version
      register: version_output

    - name: Detect platform type
      ansible.builtin.set_fact:
        platform: >-
          {{ 'iosxe' if ('IOS XE' in version_output.stdout[0] or 'IOS-XE' in version_output.stdout[0])
             else 'cbs' if ('CBS' in version_output.stdout[0] or 'Active-image' in version_output.stdout[0])
             else 'unknown' }}

    # Skip if pre-checks already determined this host is up to date
    - name: Skip host — already on target version
      ansible.builtin.meta: end_host
      when: not (needs_upgrade | default(true) | bool)

    # =========================================================================
    # IDEMPOTENCY CHECK — skip transfer if image already staged
    # =========================================================================

    # IOS-XE: check if file already exists on flash
    - name: Check if image already exists on flash (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - "dir flash:{{ firmware_target_image | default(firmware.target_image) }}"
      register: image_check_iosxe
      ignore_errors: true
      when: platform == 'iosxe'

    # CBS: check show bootvar — if target image name appears anywhere
    # (active or inactive), it is already on the switch
    - name: Check bootvar for target image (CBS)
      cisco.ios.ios_command:
        commands:
          - show bootvar
      register: image_check_cbs
      ignore_errors: true
      when: platform == 'cbs'

    - name: Set image_exists flag
      ansible.builtin.set_fact:
        image_exists: >-
          {{ (image_check_iosxe is succeeded and image_check_iosxe is not skipped)
             if platform == 'iosxe'
             else (firmware_target_image | default(firmware.target_image)
                   in image_check_cbs.stdout[0]) }}

    - name: Inform operator — image already present, skipping transfer
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}:
          {{ firmware_target_image | default(firmware.target_image) }}
          already present — skipping transfer.
      when: image_exists

    # =========================================================================
    # FILE TRANSFER — IOS-XE
    # Pushes directly to flash: on the device
    # =========================================================================

    - name: Push firmware image to device flash (IOS-XE)
      ansible.netcommon.net_put:
        src:      "{{ firmware_local_bin_path }}"
        dest:     "flash:/{{ firmware_target_image | default(firmware.target_image) }}"
        protocol: scp
      when: platform == 'iosxe' and not image_exists
      vars:
        ansible_command_timeout: 2700

    # =========================================================================
    # FILE TRANSFER — CBS
    # CBS uses a two-slot system: active and inactive image.
    # New firmware must be uploaded to the inactive slot path.
    # We read the inactive path from 'show bootvar' so we always
    # overwrite the correct slot regardless of the filename.
    # =========================================================================

    - name: Get inactive image slot path from bootvar (CBS)
      cisco.ios.ios_command:
        commands:
          - show bootvar
      register: bootvar_output
      when: platform == 'cbs' and not image_exists

    - name: Parse inactive image path from bootvar (CBS)
      ansible.builtin.set_fact:
        cbs_inactive_path: >-
          {% set found = namespace(path='flash://system/images/image1.bin') %}
          {% for line in bootvar_output.stdout[0].splitlines() %}
            {% if 'Inactive-image:' in line %}
              {% set found.path = line.split('Inactive-image:')[-1].strip() %}
            {% endif %}
          {% endfor %}
          {{ found.path }}
      when: platform == 'cbs' and not image_exists

    - name: Show inactive slot path that will be used (CBS)
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: uploading to inactive slot {{ cbs_inactive_path }}"
      when: platform == 'cbs' and not image_exists

    - name: Push firmware image to inactive slot (CBS)
      ansible.netcommon.net_put:
        src:      "{{ firmware_local_bin_path }}"
        dest:     "{{ cbs_inactive_path }}"
        protocol: scp
      when: platform == 'cbs' and not image_exists
      vars:
        ansible_command_timeout: 2700

    # =========================================================================
    # MD5 VERIFICATION — IOS-XE only
    # CBS does not support 'verify /md5' — transfer success is confirmed
    # by the net_put task completing without error
    # =========================================================================

    - name: Verify MD5 of image on flash (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - "verify /md5 flash:{{ firmware_target_image | default(firmware.target_image) }}"
      register: md5_iosxe
      when: platform == 'iosxe'
      vars:
        ansible_command_timeout: 600

    - name: Assert MD5 matches (IOS-XE)
      ansible.builtin.assert:
        that:
          - firmware_target_md5 | default(firmware.target_md5) in md5_iosxe.stdout[0]
        fail_msg: >
          MD5 MISMATCH on {{ inventory_hostname }}.
          Expected: {{ firmware_target_md5 | default(firmware.target_md5) }}.
          DO NOT proceed — delete the image and re-run staging.
        success_msg: "MD5 verified on {{ inventory_hostname }}."
      when: platform == 'iosxe'

    - name: Confirm CBS image staged successfully
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}: firmware uploaded to inactive slot {{ cbs_inactive_path }}.
          Run Phase 3 to activate and reboot.
      when: platform == 'cbs' and not image_exists

    # =========================================================================
    # STATUS FILE — read by upgrade_tool.py for the summary table
    # =========================================================================

    - name: Write status — image staged, reboot required
      ansible.builtin.copy:
        content: |
          host={{ inventory_hostname }}
          ip={{ ansible_host }}
          platform={{ platform }}
          status=STAGED
          target_version={{ firmware_target_version | default(firmware.target_version) }}
        dest: "reports/status/{{ inventory_hostname }}.status"
      delegate_to: localhost
