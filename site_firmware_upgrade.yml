# =============================================================================
# site_firmware_upgrade.yml — MASTER PLAYBOOK
# Purpose : Run all four upgrade phases in sequence.
#           Each phase auto-detects whether the target is IOS-XE or CBS
#           and runs the appropriate tasks automatically.
#
# Supported platforms:
#   - Cisco IOS-XE  (Catalyst 9000 series and similar)
#   - Cisco CBS     (Business Switch — CBS250, CBS350 series)
#
# Usage:
#   Full run:
#     python upgrade_tool.py
#
#   Direct (all phases):
#     ansible-playbook site_firmware_upgrade.yml -i <inventory> [options]
#
#   Single phase by tag:
#     ansible-playbook site_firmware_upgrade.yml --tags stage [options]
#
# Tags:
#   preflight / pre_upgrade   → Phase 1
#   stage                     → Phase 2
#   upgrade / reload          → Phase 3
#   verify / post_upgrade     → Phase 4
# =============================================================================
---

- name: "PHASE 1/4 — Pre-upgrade checks"
  ansible.builtin.import_playbook: pre_upgrade_checks.yml
  tags:
    - preflight
    - pre_upgrade

- name: "PHASE 2/4 — Stage firmware"
  ansible.builtin.import_playbook: stage_firmware.yml
  tags:
    - stage

- name: "PHASE 3/4 — Execute upgrade (reload)"
  ansible.builtin.import_playbook: execute_upgrade.yml
  tags:
    - upgrade
    - reload

- name: "PHASE 4/4 — Post-upgrade verification"
  ansible.builtin.import_playbook: post_upgrade_verify.yml
  tags:
    - verify
    - post_upgrade
