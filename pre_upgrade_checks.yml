# =============================================================================
# pre_upgrade_checks.yml
# Purpose : Validate every device is ready for a firmware upgrade.
#           Automatically detects whether the device is Cisco IOS-XE (Catalyst)
#           or Cisco CBS (Business Switch) and runs the appropriate checks.
# Outputs : - backups/pre-upgrade/<hostname>_<version>.cfg
#           - reports/pre-upgrade/<hostname>.yml
# Run order: 1 of 4
# =============================================================================
---
- name: Pre-upgrade validation
  hosts: upgrade_candidates
  gather_facts: false
  connection: network_cli
  serial: 1

  tasks:

    # =========================================================================
    # PLATFORM DETECTION
    # Runs 'show version' once and detects which platform we are talking to.
    # Sets platform fact to either 'iosxe' or 'cbs' for use in all tasks below.
    # =========================================================================

    - name: Get show version output
      cisco.ios.ios_command:
        commands:
          - show version
      register: version_output

    - name: Detect platform type
      ansible.builtin.set_fact:
        platform: >-
          {{ 'iosxe' if ('IOS XE' in version_output.stdout[0] or 'IOS-XE' in version_output.stdout[0])
             else 'cbs' if ('CBS' in version_output.stdout[0] or 'Active-image' in version_output.stdout[0])
             else 'unknown' }}

    - name: Fail if platform could not be identified
      ansible.builtin.fail:
        msg: >
          Could not identify platform on {{ inventory_hostname }}.
          Expected 'IOS XE' or 'Active-image' in show version output.
          Raw output: {{ version_output.stdout[0][:200] }}
      when: platform == 'unknown'

    - name: Confirm detected platform
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} detected as {{ platform | upper }}."

    # =========================================================================
    # VERSION PARSING — platform specific
    # =========================================================================

    # IOS-XE: "Cisco IOS XE Software, Version 17.09.04a"
    - name: Parse current version (IOS-XE)
      ansible.builtin.set_fact:
        current_version: >-
          {{ version_output.stdout[0]
             | regex_search('Version\s+(\S+)', '\1')
             | first }}
      when: platform == 'iosxe'

    # CBS: "Active-image: flash://system/images/image_cbs_ros_3.5.3.3...\n  Version: 3.5.3.3"
    - name: Parse current version (CBS)
      ansible.builtin.set_fact:
        current_version: >-
          {{ version_output.stdout[0]
             | regex_search('Active-image:.*\n\s+Version:\s+(\S+)', '\1')
             | first }}
      when: platform == 'cbs'

    - name: Report current version
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} is currently running {{ current_version }}."

    # Set needs_upgrade fact — used by ALL subsequent phases to skip this host
    # if it is already running the target version.
    - name: Record whether this host needs an upgrade
      ansible.builtin.set_fact:
        needs_upgrade: "{{ current_version != firmware_target_version | default(firmware.target_version) }}"

    - name: Inform operator — device already on target version, will be skipped
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }} is already running
          {{ firmware_target_version | default(firmware.target_version) }} — skipping all phases.
      when: not needs_upgrade

    - name: Skip remaining pre-checks for this host (already up to date)
      ansible.builtin.meta: end_host
      when: not needs_upgrade

    - name: Confirm upgrade is needed
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}: upgrading from {{ current_version }}
          to {{ firmware_target_version | default(firmware.target_version) }}.

    # =========================================================================
    # FLASH SPACE CHECK — platform specific
    # =========================================================================

    # IOS-XE: 'dir flash: | include free' returns "XXXXXXX bytes free"
    - name: Check free flash space (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - "dir flash: | include free"
      register: flash_iosxe
      when: platform == 'iosxe'
      ignore_errors: true

    - name: Parse free flash bytes (IOS-XE)
      ansible.builtin.set_fact:
        free_space: >-
          {{ flash_iosxe.stdout[0]
             | regex_search('(\d+) bytes free', '\1')
             | first | default('0') }}
      when: platform == 'iosxe' and flash_iosxe is succeeded

    # CBS: 'dir' output includes free space but in a different format
    # CBS flash path is flash://system/images/ — check total dir listing
    - name: Check free flash space (CBS)
      cisco.ios.ios_command:
        commands:
          - "dir"
      register: flash_cbs
      when: platform == 'cbs'
      ignore_errors: true

    - name: Parse free flash bytes (CBS)
      ansible.builtin.set_fact:
        free_space: >-
          {{ flash_cbs.stdout[0]
             | regex_search('(\d+)\s+bytes free', '\1')
             | first | default('0') }}
      when: platform == 'cbs' and flash_cbs is succeeded

    - name: Set free_space to 0 if check failed
      ansible.builtin.set_fact:
        free_space: "0"
      when: free_space is not defined

    - name: Warn if flash space check returned no data
      ansible.builtin.debug:
        msg: >
          WARNING: Could not check free flash space on {{ inventory_hostname }}.
          Verify space manually before proceeding.
      when: free_space == "0"

    - name: Assert sufficient flash space
      ansible.builtin.assert:
        that:
          - free_space | int > firmware.min_flash_space
        fail_msg: >
          PREFLIGHT FAILED on {{ inventory_hostname }}:
          only {{ free_space | int | filesizeformat }} free,
          need {{ firmware.min_flash_space | int | filesizeformat }}.
        success_msg: "Flash OK on {{ inventory_hostname }}: {{ free_space | int | filesizeformat }} free."
      when: free_space != "0"

    # =========================================================================
    # CPU CHECK — platform specific
    # =========================================================================

    # IOS-XE: 'show processes cpu | include CPU' → "five minutes: XX%"
    - name: Check CPU utilisation (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - "show processes cpu | include CPU"
      register: cpu_iosxe
      when: platform == 'iosxe'
      ignore_errors: true

    - name: Parse CPU usage (IOS-XE)
      ansible.builtin.set_fact:
        cpu_usage: >-
          {{ cpu_iosxe.stdout[0]
             | regex_search('five minutes:\s*(\d+)', '\1')
             | first | default('0') }}
      when: platform == 'iosxe' and cpu_iosxe is succeeded

    # CBS: 'show process cpu' — format differs, extract utilization percentage
    - name: Check CPU utilisation (CBS)
      cisco.ios.ios_command:
        commands:
          - show process cpu
      register: cpu_cbs
      when: platform == 'cbs'
      ignore_errors: true

    - name: Parse CPU usage (CBS)
      ansible.builtin.set_fact:
        cpu_usage: >-
          {{ cpu_cbs.stdout[0]
             | regex_search('(\d+)%', '\1')
             | first | default('0') }}
      when: platform == 'cbs' and cpu_cbs is succeeded

    - name: Set cpu_usage to 0 if check failed
      ansible.builtin.set_fact:
        cpu_usage: "0"
      when: cpu_usage is not defined

    - name: Warn if CPU check returned no data
      ansible.builtin.debug:
        msg: >
          WARNING: Could not check CPU on {{ inventory_hostname }}.
          Verify device is not under heavy load before proceeding.
      when: cpu_usage == "0"

    - name: Assert CPU within threshold
      ansible.builtin.assert:
        that:
          - cpu_usage | int < firmware.cpu_threshold
        fail_msg: >
          PREFLIGHT FAILED on {{ inventory_hostname }}:
          CPU at {{ cpu_usage }}% (threshold {{ firmware.cpu_threshold }}%).
        success_msg: "CPU OK on {{ inventory_hostname }}: {{ cpu_usage }}%."
      when: cpu_usage != "0"

    # =========================================================================
    # CONFIG BACKUP
    # =========================================================================

    - name: Back up running configuration
      cisco.ios.ios_config:
        backup: true
        backup_options:
          dir_path: "backups/pre-upgrade"
          filename: "{{ inventory_hostname }}_{{ current_version }}.cfg"

    # =========================================================================
    # STATE SNAPSHOT
    # =========================================================================

    - name: Write pre-upgrade state snapshot
      ansible.builtin.copy:
        content: |
          hostname:        {{ inventory_hostname }}
          platform:        {{ platform }}
          current_version: {{ current_version }}
          target_version:  {{ firmware_target_version | default(firmware.target_version) }}
          free_space_b:    {{ free_space }}
          cpu_5min_pct:    {{ cpu_usage }}
          timestamp:       {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
        dest: "reports/pre-upgrade/{{ inventory_hostname }}.yml"
      delegate_to: localhost
