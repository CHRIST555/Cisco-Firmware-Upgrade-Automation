# =============================================================================
# group_vars/ios_routers/firmware.yml
# Purpose : Variables for Cisco IOS-XE firmware upgrade automation
# Scope   : Applied to all hosts in the ios_routers group
# Note    : Sensitive values (passwords) must be stored in Ansible Vault.
#           Run: ansible-vault encrypt_string '<password>' --name 'vault_firmware_password'
# =============================================================================

---
firmware:

  # ---------------------------------------------------------------------------
  # Target image details
  # Update these values for each upgrade campaign.
  # target_md5 must match the MD5 published on Cisco's software download page.
  # ---------------------------------------------------------------------------
  target_version: "17.09.04a"                              # IOS-XE version string as shown in 'show version'
  target_image:   "cat9k_iosxe.17.09.04a.SPA.bin"         # Exact filename on flash / file server
  target_md5:     "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"      # MD5 checksum from Cisco (32 hex chars)
  target_size_mb: 850                                      # Approximate image size — used for pre-flight logging only

  # ---------------------------------------------------------------------------
  # File server — source of the firmware image
  # Supported protocols: scp (recommended), tftp, ftp, http
  # The firmware user needs read access to file_server_path on the server.
  # ---------------------------------------------------------------------------
  file_server:          "10.10.1.100"
  file_server_protocol: "scp"                              # Protocol used in the IOS 'copy' command
  file_server_path:     "/firmware/cisco/ios"              # Absolute path on the file server
  file_server_user:     "firmware"
  file_server_password: "{{ vault_firmware_password }}"    # Never store plain-text — use Ansible Vault

  # ---------------------------------------------------------------------------
  # Safety thresholds — pre-upgrade checks will fail if these are not met
  # min_flash_space: bytes of free flash required before attempting a transfer.
  #   850 MB image + ~15 % headroom → ~1 000 000 000 bytes (~953 MiB).
  #   Adjust if your image is larger.
  # cpu_threshold:   maximum 5-minute CPU average (%) allowed before aborting.
  # ---------------------------------------------------------------------------
  min_flash_space: 1000000000   # 1 GB in bytes
  cpu_threshold:   80           # Percent — mirrors the assert in pre_upgrade_checks.yml

  # ---------------------------------------------------------------------------
  # Boot variable — written to device config during execute_upgrade.yml
  # This is derived from target_image; do not edit independently.
  # ---------------------------------------------------------------------------
  boot_system: "flash:{{ firmware.target_image }}"
