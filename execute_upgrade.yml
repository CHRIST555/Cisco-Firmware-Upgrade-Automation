# =============================================================================
# execute_upgrade.yml
# Purpose : Set the boot image and reload the device. Platform detected
#           automatically — IOS-XE and CBS use completely different commands.
#
# IOS-XE : 'boot system flash:<image>' → reload
# CBS     : 'boot system image-list flash://system/images/<image>' → reload
#           CBS may also require activating the image before reload
#
# WARNING : This playbook causes a network outage on each device.
#           Always run during a maintenance window.
# Run order: 3 of 4
# =============================================================================
---
- name: Execute firmware upgrade
  hosts: upgrade_candidates
  gather_facts: false
  connection: network_cli
  serial: 1    # CRITICAL: one device at a time

  tasks:

    # =========================================================================
    # PLATFORM DETECTION
    # =========================================================================

    - name: Get show version output
      cisco.ios.ios_command:
        commands:
          - show version
      register: version_output

    - name: Detect platform type
      ansible.builtin.set_fact:
        platform: >-
          {{ 'iosxe' if ('IOS XE' in version_output.stdout[0] or 'IOS-XE' in version_output.stdout[0])
             else 'cbs' if ('CBS' in version_output.stdout[0] or 'Active-image' in version_output.stdout[0])
             else 'unknown' }}

    # Skip this entire phase if pre-checks determined no upgrade is needed
    - name: Skip host — already on target version
      ansible.builtin.meta: end_host
      when: not (needs_upgrade | default(true) | bool)

    - name: Confirm platform before proceeding
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} — platform: {{ platform | upper }}. Proceeding with upgrade."

    # =========================================================================
    # SET BOOT IMAGE — IOS-XE
    # =========================================================================

    - name: Clear existing boot statements and set new image (IOS-XE)
      cisco.ios.ios_config:
        lines:
          - "no boot system"
          - "boot system flash:{{ firmware_target_image | default(firmware.target_image) }}"
        save_when: always
      when: platform == 'iosxe'

    - name: Verify boot variable is set correctly (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - show boot
      register: boot_check
      when: platform == 'iosxe'

    - name: Assert boot variable contains target image (IOS-XE)
      ansible.builtin.assert:
        that:
          - firmware_target_image | default(firmware.target_image) in boot_check.stdout[0]
        fail_msg: >
          Boot variable NOT set correctly on {{ inventory_hostname }}.
          Aborting — check 'show boot' manually.
        success_msg: "Boot variable confirmed on {{ inventory_hostname }}."
      when: platform == 'iosxe'

    # =========================================================================
    # SET BOOT IMAGE — CBS
    # CBS uses a different boot command and may support 'boot system image-list'
    # Some CBS models activate via 'firmware upgrade' or by setting next boot image
    # =========================================================================

    - name: Set next boot image (CBS)
      cisco.ios.ios_config:
        lines:
          - "boot system image-list flash://system/images/{{ firmware_target_image | default(firmware.target_image) }}"
        save_when: always
      when: platform == 'cbs'
      ignore_errors: true    # Command syntax varies between CBS models — see note below
      register: cbs_boot_set

    # Note: If 'boot system image-list' is not supported on your CBS model,
    # the upgrade may need to be completed via the web UI or a different CLI
    # command. Check your CBS model's admin guide for the correct command.
    - name: Warn if CBS boot command may not have been accepted
      ansible.builtin.debug:
        msg: >
          WARNING: 'boot system image-list' may not be supported on this CBS model.
          If the reload does not boot the new image, set the active image manually
          via the switch web UI (Administration > File Management > Active Image).
      when: platform == 'cbs' and cbs_boot_set is failed

    # =========================================================================
    # SAVE CONFIG AND RELOAD — both platforms
    # =========================================================================

    - name: Save running configuration before reload
      cisco.ios.ios_command:
        commands:
          - write memory

    - name: Reload device (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - command: reload
            prompt:
              - "Save"       # "Save configuration? [yes/no]:"
              - "confirm"    # "Proceed with reload? [confirm]"
            answer:
              - "y"
              - "y"
      vars:
        ansible_command_timeout: 30
      ignore_errors: true    # SSH drops immediately on reload — this is expected
      when: platform == 'iosxe'

    - name: Reload device (CBS)
      cisco.ios.ios_command:
        commands:
          - command: reload
            prompt:
              - "proceed"    # CBS: "Are you sure you want to proceed? [y/n]:"
            answer:
              - "y"
      vars:
        ansible_command_timeout: 30
      ignore_errors: true    # SSH drops immediately on reload — this is expected
      when: platform == 'cbs'

    # =========================================================================
    # WAIT FOR DEVICE TO RECOVER
    # =========================================================================

    - name: Wait for SSH port to reopen after reboot
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        delay: 120      # Wait 2 min before polling — device is still shutting down
        timeout: 600    # Up to 10 min total wait
        state: started
      delegate_to: localhost

    - name: Allow services and routing protocols to stabilise
      ansible.builtin.pause:
        seconds: 60
        prompt: >
          Waiting 60 s for {{ inventory_hostname }} to fully initialise.
          Press Ctrl+C then A to abort if needed.
