# =============================================================================
# execute_upgrade.yml
# Purpose : Activate the new firmware and reload the device.
#           Platform detected automatically.
#
# IOS-XE : Sets 'boot system flash:<image>', saves config, reloads
# CBS     : Runs 'boot system inactive-image' to swap active/inactive,
#           saves config, reloads. New image must already be in inactive
#           slot (done by Phase 2 - stage_firmware.yml)
#
# WARNING : This playbook reboots devices. Always run during a maintenance
#           window. serial: 1 ensures only one device reboots at a time.
#
# Run order: 3 of 4
# =============================================================================
---
- name: Execute firmware upgrade
  hosts: upgrade_candidates
  gather_facts: false
  connection: network_cli
  serial: 1

  tasks:

    # =========================================================================
    # PLATFORM DETECTION
    # =========================================================================

    - name: Get show version output
      cisco.ios.ios_command:
        commands:
          - show version
      register: version_output

    - name: Detect platform type
      ansible.builtin.set_fact:
        platform: >-
          {{ 'iosxe' if ('IOS XE' in version_output.stdout[0] or 'IOS-XE' in version_output.stdout[0])
             else 'cbs' if ('CBS' in version_output.stdout[0] or 'Active-image' in version_output.stdout[0])
             else 'unknown' }}

    # Skip if already on target version
    - name: Skip host — already on target version
      ansible.builtin.meta: end_host
      when: not (needs_upgrade | default(true) | bool)

    - name: Confirm platform and proceeding with upgrade
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} — platform: {{ platform | upper }}. Proceeding with upgrade."

    # =========================================================================
    # SET BOOT IMAGE — IOS-XE
    # =========================================================================

    - name: Clear existing boot statements and set new image (IOS-XE)
      cisco.ios.ios_config:
        lines:
          - "no boot system"
          - "boot system flash:{{ firmware_target_image | default(firmware.target_image) }}"
        save_when: always
      when: platform == 'iosxe'

    - name: Verify boot variable is set correctly (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - show boot
      register: boot_check
      when: platform == 'iosxe'

    - name: Assert boot variable contains target image (IOS-XE)
      ansible.builtin.assert:
        that:
          - firmware_target_image | default(firmware.target_image) in boot_check.stdout[0]
        fail_msg: >
          Boot variable NOT set correctly on {{ inventory_hostname }}.
          Aborting — check 'show boot' manually.
        success_msg: "Boot variable confirmed on {{ inventory_hostname }}."
      when: platform == 'iosxe'

    # =========================================================================
    # SET BOOT IMAGE — CBS
    # 'boot system inactive-image' swaps the active and inactive image slots.
    # The new firmware must already be in the inactive slot (Phase 2).
    # =========================================================================

    - name: Confirm target image is in bootvar before swapping (CBS)
      cisco.ios.ios_command:
        commands:
          - show bootvar
      register: cbs_bootvar
      when: platform == 'cbs'

    - name: Assert target image is present in bootvar (CBS)
      ansible.builtin.assert:
        that:
          - firmware_target_image | default(firmware.target_image)
            in cbs_bootvar.stdout[0]
        fail_msg: >
          Target image {{ firmware_target_image | default(firmware.target_image) }}
          not found in show bootvar on {{ inventory_hostname }}.
          Run Phase 2 (stage firmware) before attempting upgrade.
        success_msg: "Target image confirmed in bootvar — ready to swap."
      when: platform == 'cbs'

    - name: Swap inactive image to active (CBS)
      cisco.ios.ios_command:
        commands:
          - boot system inactive-image
      when: platform == 'cbs'

    - name: Confirm boot swap accepted (CBS)
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}: 'boot system inactive-image' accepted.
          Device will boot new firmware after reload.
      when: platform == 'cbs'

    # =========================================================================
    # SAVE CONFIG AND RELOAD
    # =========================================================================

    - name: Save running configuration before reload
      cisco.ios.ios_command:
        commands:
          - write memory

    - name: Reload device (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - command: reload
            prompt:
              - "Save"
              - "confirm"
            answer:
              - "y"
              - "y"
      vars:
        ansible_command_timeout: 30
      ignore_errors: true
      when: platform == 'iosxe'

    - name: Reload device (CBS)
      cisco.ios.ios_command:
        commands:
          - command: reload
            prompt:
              - "proceed"
            answer:
              - "y"
      vars:
        ansible_command_timeout: 30
      ignore_errors: true
      when: platform == 'cbs'

    # =========================================================================
    # WAIT FOR DEVICE TO RECOVER
    # =========================================================================

    - name: Wait for SSH port to reopen after reboot
      ansible.builtin.wait_for:
        host:    "{{ ansible_host }}"
        port:    22
        delay:   120
        timeout: 600
        state:   started
      delegate_to: localhost

    - name: Allow services to stabilise after reboot
      ansible.builtin.pause:
        seconds: 60
        prompt: >
          Waiting 60 s for {{ inventory_hostname }} to fully initialise.
          Press Ctrl+C then C to continue early, or A to abort.
