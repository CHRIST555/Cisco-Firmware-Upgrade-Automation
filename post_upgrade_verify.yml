# =============================================================================
# post_upgrade_verify.yml
# Purpose : Confirm the device booted the correct firmware and key services
#           have recovered. Platform detected automatically.
# Outputs : reports/post-upgrade/<hostname>.txt
# Run order: 4 of 4
# =============================================================================
---
- name: Post-upgrade verification
  hosts: upgrade_candidates
  gather_facts: false
  connection: network_cli

  tasks:

    # =========================================================================
    # PLATFORM DETECTION
    # =========================================================================

    - name: Get show version output
      cisco.ios.ios_command:
        commands:
          - show version
      register: post_version

    - name: Detect platform type
      ansible.builtin.set_fact:
        platform: >-
          {{ 'iosxe' if ('IOS XE' in post_version.stdout[0] or 'IOS-XE' in post_version.stdout[0])
             else 'cbs' if ('CBS' in post_version.stdout[0] or 'Active-image' in post_version.stdout[0])
             else 'unknown' }}

    # =========================================================================
    # VERSION VERIFICATION
    # =========================================================================

    - name: Parse running version (IOS-XE)
      ansible.builtin.set_fact:
        new_version: >-
          {{ post_version.stdout[0]
             | regex_search('Version\s+(\S+)', '\1')
             | first }}
      when: platform == 'iosxe'

    - name: Parse running version (CBS)
      ansible.builtin.set_fact:
        new_version: >-
          {{ post_version.stdout[0]
             | regex_search('Active-image:.*\n\s+Version:\s+(\S+)', '\1')
             | first }}
      when: platform == 'cbs'

    - name: Assert device is running the target version
      ansible.builtin.assert:
        that:
          - new_version == firmware_target_version | default(firmware.target_version)
        fail_msg: >
          UPGRADE FAILED on {{ inventory_hostname }}:
          running {{ new_version }},
          expected {{ firmware_target_version | default(firmware.target_version) }}.
          Check boot variable and flash contents manually.
        success_msg: >
          Version OK on {{ inventory_hostname }}: now running {{ new_version }}.

    # =========================================================================
    # SERVICE HEALTH CHECKS — platform specific
    # =========================================================================

    # IOS-XE interface check
    - name: Collect interface status (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
      register: interfaces
      ignore_errors: true
      when: platform == 'iosxe'

    # CBS interface check — uses different command
    - name: Collect interface status (CBS)
      cisco.ios.ios_command:
        commands:
          - show interfaces status
      register: interfaces
      ignore_errors: true
      when: platform == 'cbs'

    # IOS-XE routing protocol check
    - name: Collect OSPF and BGP status (IOS-XE)
      cisco.ios.ios_command:
        commands:
          - show ip ospf neighbor
          - show ip bgp summary
      register: routing
      ignore_errors: true
      when: platform == 'iosxe'

    # CBS routing check — show ip route is the most universal command
    - name: Collect routing table summary (CBS)
      cisco.ios.ios_command:
        commands:
          - show ip route
      register: routing
      ignore_errors: true
      when: platform == 'cbs'

    - name: Report OSPF adjacency count (IOS-XE)
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }} OSPF FULL neighbors:
          {{ routing.stdout[0] | regex_findall('FULL') | length }}.
      when: platform == 'iosxe' and routing is succeeded

    # =========================================================================
    # UPGRADE REPORT
    # =========================================================================

    - name: Write upgrade report to control node
      ansible.builtin.copy:
        content: |
          ============================================================
          Upgrade Report: {{ inventory_hostname }}
          ============================================================
          Platform         : {{ platform | upper }}
          Previous Version : {{ hostvars[inventory_hostname].current_version | default('unknown') }}
          Current Version  : {{ new_version }}
          Target Version   : {{ firmware_target_version | default(firmware.target_version) }}
          Status           : {{ 'SUCCESS' if new_version == firmware_target_version | default(firmware.target_version) else 'FAILED' }}
          Timestamp (UTC)  : {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
          ------------------------------------------------------------
          Interface Summary:
          {{ interfaces.stdout[0] | default('N/A') }}
          ------------------------------------------------------------
          Routing Summary:
          {{ routing.stdout[0] | default('N/A') }}
          ============================================================
        dest: "reports/post-upgrade/{{ inventory_hostname }}.txt"
      delegate_to: localhost
